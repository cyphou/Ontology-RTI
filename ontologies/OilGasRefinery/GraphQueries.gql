/*
 * Oil & Gas Refinery Ontology - GQL Example Queries
 * ==================================================
 * Graph Query Language (GQL) - ISO/IEC 39075:2024
 * For use with the Fabric Graph Query Set against the ontology Graph Model.
 *
 * IMPORTANT: Paste ONE query at a time into the Fabric Graph Query Set editor.
 *            Do NOT paste this entire file. Each section below is one query.
 *
 * Graph Schema:
 *   Nodes: Refinery, ProcessUnit, Equipment, Pipeline, CrudeOil,
 *          RefinedProduct, StorageTank, Sensor, Employee,
 *          MaintenanceEvent, SafetyAlarm, ProductionRecord, CrudeOilFeed
 *
 *   Edges:
 *     Refinery -[HAS_PROCESS_UNIT]-> ProcessUnit
 *     ProcessUnit -[HAS_EQUIPMENT]-> Equipment
 *     Equipment -[HAS_SENSOR]-> Sensor
 *     Refinery -[HAS_PIPELINE]-> Pipeline
 *     Pipeline -[PIPELINE_FROM]-> ProcessUnit
 *     Refinery -[HAS_STORAGE_TANK]-> StorageTank
 *     StorageTank -[HOLDS_PRODUCT]-> RefinedProduct
 *     Refinery -[EMPLOYS]-> Employee
 *     MaintenanceEvent -[MAINTENANCE_ON]-> Equipment
 *     MaintenanceEvent -[PERFORMED_BY]-> Employee
 *     SafetyAlarm -[ALARM_FROM]-> Sensor
 *     ProductionRecord -[PRODUCED_BY]-> ProcessUnit
 *     ProductionRecord -[PRODUCES]-> RefinedProduct
 *     CrudeOilFeed -[FEEDS_INTO]-> ProcessUnit
 *     CrudeOilFeed -[CRUDE_SOURCE]-> CrudeOil
 */


/* ===== Query 1: Full Refinery Topology ===== */

MATCH (n)-[e]->(m)
RETURN n, e, m
LIMIT 200


/* ===== Query 2: Refinery Process Units and Equipment ===== */

MATCH (r:Refinery)-[:HAS_PROCESS_UNIT]->(pu:ProcessUnit)-[:HAS_EQUIPMENT]->(eq:Equipment)
RETURN r.RefineryName AS Refinery,
       pu.ProcessUnitName AS ProcessUnit,
       pu.ProcessUnitType AS UnitType,
       eq.EquipmentName AS Equipment,
       eq.EquipmentType AS EquipmentType
LIMIT 100


/* ===== Query 3: Equipment Sensors and Safety Alarms ===== */

MATCH (eq:Equipment)-[:HAS_SENSOR]->(s:Sensor)<-[:ALARM_FROM]-(sa:SafetyAlarm)
RETURN eq.EquipmentName AS Equipment,
       s.SensorName AS Sensor,
       s.SensorType AS SensorType,
       sa.AlarmType AS AlarmType,
       sa.Severity AS Severity,
       sa.AlarmTimestamp AS `Timestamp`
LIMIT 100


/* ===== Query 4: Maintenance Events by Employee and Equipment ===== */

MATCH (emp:Employee)<-[:PERFORMED_BY]-(me:MaintenanceEvent)-[:MAINTENANCE_ON]->(eq:Equipment)
RETURN emp.FirstName AS Technician,
       emp.Role AS `Role`,
       me.MaintenanceType AS MaintenanceType,
       me.StartDate AS `Date`,
       me.DurationHours AS DurationHrs,
       me.CostUSD AS Cost,
       eq.EquipmentName AS Equipment
ORDER BY me.StartDate DESC
LIMIT 50


/* ===== Query 5: Crude Oil Supply Chain ===== */

MATCH (co:CrudeOil)<-[:CRUDE_SOURCE]-(cf:CrudeOilFeed)-[:FEEDS_INTO]->(pu:ProcessUnit)
RETURN co.CrudeGradeName AS CrudeOil,
       co.APIGravity AS APIGravity,
       co.SulfurContentPct AS SulfurPct,
       co.Origin AS Origin,
       pu.ProcessUnitName AS ProcessUnit,
       pu.ProcessUnitType AS UnitType
LIMIT 50


/* ===== Query 6: Production Records by Product ===== */

MATCH (pu:ProcessUnit)<-[:PRODUCED_BY]-(pr:ProductionRecord)-[:PRODUCES]->(rp:RefinedProduct)
RETURN pu.ProcessUnitName AS ProcessUnit,
       rp.ProductName AS Product,
       rp.ProductCategory AS Category,
       pr.OutputBarrels AS Barrels,
       pr.ProductionDate AS `Date`
ORDER BY pr.ProductionDate DESC
LIMIT 50


/* ===== Query 7: Storage Tanks and Products ===== */

MATCH (r:Refinery)-[:HAS_STORAGE_TANK]->(st:StorageTank)-[:HOLDS_PRODUCT]->(rp:RefinedProduct)
RETURN r.RefineryName AS Refinery,
       st.TankName AS Tank,
       st.CapacityBarrels AS CapacityBBL,
       st.CurrentLevelBarrels AS CurrentLevel,
       rp.ProductName AS Product
LIMIT 50


/* ===== Query 8: Pipeline Network ===== */

MATCH (r:Refinery)-[:HAS_PIPELINE]->(p:Pipeline)-[:PIPELINE_FROM]->(pu:ProcessUnit)
RETURN r.RefineryName AS Refinery,
       p.PipelineName AS Pipeline,
       p.DiameterInches AS Diameter,
       p.Material AS Material,
       pu.ProcessUnitName AS ConnectedUnit
LIMIT 50


/* ===== Query 9: End-to-End Crude Oil to Refined Product ===== */

MATCH (co:CrudeOil)<-[:CRUDE_SOURCE]-(cf:CrudeOilFeed)-[:FEEDS_INTO]->(pu:ProcessUnit)<-[:PRODUCED_BY]-(pr:ProductionRecord)-[:PRODUCES]->(rp:RefinedProduct)
RETURN co.CrudeGradeName AS CrudeSource,
       co.Origin AS Origin,
       pu.ProcessUnitName AS ProcessUnit,
       rp.ProductName AS Product,
       pr.OutputBarrels AS OutputBarrels
LIMIT 50


/* ===== Query 10: Workforce and Maintenance Activity ===== */

MATCH (r:Refinery)-[:EMPLOYS]->(emp:Employee)<-[:PERFORMED_BY]-(me:MaintenanceEvent)
RETURN r.RefineryName AS Refinery,
       emp.FirstName AS Employee,
       emp.Department AS Department,
       COUNT(me) AS MaintenanceCount
LIMIT 50


/* ==========================================================================
 * ADVANCED QUERIES (11-20)
 * Multi-hop traversals, filtering, aggregation, and cross-domain analysis
 * ========================================================================== */


/* ===== Query 11: High-Cost Maintenance on Critical Equipment ===== */
/* 4-hop: Refinery -> ProcessUnit -> Equipment -> MaintenanceEvent -> Employee
   Filters on corrective maintenance with cost > 5000 on critical equipment */

MATCH (r:Refinery)-[:HAS_PROCESS_UNIT]->(pu:ProcessUnit)-[:HAS_EQUIPMENT]->(eq:Equipment)<-[:MAINTENANCE_ON]-(me:MaintenanceEvent)-[:PERFORMED_BY]->(emp:Employee)
WHERE eq.CriticalityLevel = 'High' AND me.MaintenanceType = 'Corrective' AND me.CostUSD > 5000
RETURN r.RefineryName AS Refinery,
       pu.ProcessUnitName AS ProcessUnit,
       eq.EquipmentName AS Equipment,
       me.CostUSD AS Cost,
       me.DurationHours AS DowntimeHrs,
       emp.FirstName AS Technician,
       me.StartDate AS StartedOn
ORDER BY me.CostUSD DESC
LIMIT 50


/* ===== Query 12: Equipment with Both Alarms and Recent Maintenance ===== */
/* Two-pattern match: finds equipment that triggered safety alarms
   AND had maintenance events, correlating alarm severity with repair cost */

MATCH (eq:Equipment)-[:HAS_SENSOR]->(s:Sensor)<-[:ALARM_FROM]-(sa:SafetyAlarm)
MATCH (me:MaintenanceEvent)-[:MAINTENANCE_ON]->(eq)
RETURN eq.EquipmentName AS Equipment,
       eq.CriticalityLevel AS Criticality,
       sa.AlarmType AS AlarmType,
       sa.Severity AS AlarmSeverity,
       me.MaintenanceType AS MaintenanceType,
       me.CostUSD AS RepairCost,
       me.DurationHours AS RepairHours
ORDER BY sa.Severity DESC, me.CostUSD DESC
LIMIT 50


/* ===== Query 13: Refinery Production Yield Analysis ===== */
/* 4-hop: Refinery -> ProcessUnit -> ProductionRecord -> RefinedProduct
   Aggregates total output and average yield per refinery and product */

MATCH (r:Refinery)-[:HAS_PROCESS_UNIT]->(pu:ProcessUnit)<-[:PRODUCED_BY]-(pr:ProductionRecord)-[:PRODUCES]->(rp:RefinedProduct)
RETURN r.RefineryName AS Refinery,
       rp.ProductName AS Product,
       rp.ProductCategory AS Category,
       SUM(pr.OutputBarrels) AS TotalBarrels,
       AVG(pr.YieldPercent) AS AvgYieldPct,
       COUNT(pr) AS BatchCount
ORDER BY TotalBarrels DESC
LIMIT 50


/* ===== Query 14: Crude-to-Product Cost Traceability ===== */
/* 5-hop end-to-end: CrudeOil -> CrudeOilFeed -> ProcessUnit -> ProductionRecord -> RefinedProduct
   Compares crude input cost with refined product output value */

MATCH (co:CrudeOil)<-[:CRUDE_SOURCE]-(cf:CrudeOilFeed)-[:FEEDS_INTO]->(pu:ProcessUnit)<-[:PRODUCED_BY]-(pr:ProductionRecord)-[:PRODUCES]->(rp:RefinedProduct)
RETURN co.CrudeGradeName AS CrudeGrade,
       co.Classification AS CrudeClass,
       co.PricePerBarrelUSD AS CrudePriceUSD,
       pu.ProcessUnitName AS ProcessUnit,
       rp.ProductName AS Product,
       rp.PricePerBarrelUSD AS ProductPriceUSD,
       pr.OutputBarrels AS OutputBarrels,
       pr.YieldPercent AS YieldPct
ORDER BY pr.YieldPercent DESC
LIMIT 50


/* ===== Query 15: Sensor Coverage Gap Analysis ===== */
/* Finds equipment that has NO sensors or sensors in non-Active status
   by traversing Refinery -> ProcessUnit -> Equipment -> Sensor */

MATCH (r:Refinery)-[:HAS_PROCESS_UNIT]->(pu:ProcessUnit)-[:HAS_EQUIPMENT]->(eq:Equipment)-[:HAS_SENSOR]->(s:Sensor)
WHERE s.Status <> 'Active'
RETURN r.RefineryName AS Refinery,
       eq.EquipmentName AS Equipment,
       eq.CriticalityLevel AS Criticality,
       s.SensorName AS Sensor,
       s.SensorType AS SensorType,
       s.Status AS SensorStatus,
       s.CalibrationDate AS LastCalibration
ORDER BY eq.CriticalityLevel DESC
LIMIT 50


/* ===== Query 16: Sour Crude Processing Path ===== */
/* Traces high-sulfur (sour) crude through the refinery to final products
   Filters on sulfur content > 1.0% (sour crude threshold) */

MATCH (co:CrudeOil)<-[:CRUDE_SOURCE]-(cf:CrudeOilFeed)-[:FEEDS_INTO]->(pu:ProcessUnit)-[:HAS_EQUIPMENT]->(eq:Equipment)
WHERE co.SulfurContentPct > 1.0
RETURN co.CrudeGradeName AS SourCrude,
       co.SulfurContentPct AS SulfurPct,
       co.APIGravity AS APIGravity,
       co.Origin AS Origin,
       pu.ProcessUnitName AS ProcessUnit,
       pu.ProcessUnitType AS UnitType,
       eq.EquipmentName AS Equipment,
       cf.FeedRateBPD AS FeedRate
ORDER BY co.SulfurContentPct DESC
LIMIT 50


/* ===== Query 17: Tank Utilization with Product Economics ===== */
/* 3-hop: Refinery -> StorageTank -> RefinedProduct
   Calculates fill percentage and inventory value */

MATCH (r:Refinery)-[:HAS_STORAGE_TANK]->(st:StorageTank)-[:HOLDS_PRODUCT]->(rp:RefinedProduct)
WHERE st.Status = 'Active'
RETURN r.RefineryName AS Refinery,
       st.TankName AS Tank,
       st.TankType AS TankType,
       rp.ProductName AS Product,
       st.CapacityBarrels AS CapacityBBL,
       st.CurrentLevelBarrels AS CurrentBBL,
       rp.PricePerBarrelUSD AS PricePerBBL
ORDER BY st.CurrentLevelBarrels DESC
LIMIT 50


/* ===== Query 18: Multi-Certified Maintenance Workforce ===== */
/* 4-hop: Refinery -> Employee -> MaintenanceEvent -> Equipment -> ProcessUnit
   Groups by employee to find top maintainers with cost and equipment diversity */

MATCH (r:Refinery)-[:EMPLOYS]->(emp:Employee)<-[:PERFORMED_BY]-(me:MaintenanceEvent)-[:MAINTENANCE_ON]->(eq:Equipment)
WHERE emp.CertificationLevel = 'Expert'
RETURN r.RefineryName AS Refinery,
       emp.FirstName AS Technician,
       emp.Department AS Department,
       emp.ShiftPattern AS Shift,
       COUNT(me) AS JobCount,
       SUM(me.CostUSD) AS TotalCostManaged,
       SUM(me.DurationHours) AS TotalHours
ORDER BY JobCount DESC
LIMIT 50


/* ===== Query 19: Pipeline-Connected Process Unit Pairs ===== */
/* Explores which process units are connected via pipelines
   and what products they produce, revealing material flow */

MATCH (pu1:ProcessUnit)<-[:PIPELINE_FROM]-(p:Pipeline)<-[:HAS_PIPELINE]-(r:Refinery)
MATCH (pu1)<-[:PRODUCED_BY]-(pr:ProductionRecord)-[:PRODUCES]->(rp:RefinedProduct)
RETURN r.RefineryName AS Refinery,
       p.PipelineName AS Pipeline,
       p.DiameterInches AS Diameter,
       p.MaxFlowBPD AS MaxFlow,
       pu1.ProcessUnitName AS ConnectedUnit,
       rp.ProductName AS ProducedProduct,
       pr.OutputBarrels AS OutputBBL
ORDER BY pr.OutputBarrels DESC
LIMIT 50


/* ===== Query 20: Full Refinery Risk Profile ===== */
/* 5-hop: Refinery -> ProcessUnit -> Equipment -> Sensor -> SafetyAlarm
   Aggregates alarm counts per refinery to build a risk heatmap */

MATCH (r:Refinery)-[:HAS_PROCESS_UNIT]->(pu:ProcessUnit)-[:HAS_EQUIPMENT]->(eq:Equipment)-[:HAS_SENSOR]->(s:Sensor)<-[:ALARM_FROM]-(sa:SafetyAlarm)
WHERE sa.Severity IN ['Critical', 'High']
RETURN r.RefineryName AS Refinery,
       r.City AS City,
       r.State AS State,
       pu.ProcessUnitName AS ProcessUnit,
       eq.EquipmentName AS Equipment,
       COUNT(sa) AS CriticalAlarmCount
ORDER BY CriticalAlarmCount DESC
LIMIT 50
