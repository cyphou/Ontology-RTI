# Manufacturing Plant GraphQL Queries (ISO/IEC 39075:2024)
# Graph exploration queries for Manufacturing Plant Ontology

# 1. List all plants with status overview
MATCH (p:Plant)
RETURN p.PlantName, p.Location, p.City, p.Country, p.PlantType, p.Capacity, p.Status
ORDER BY p.PlantName

# 2. Plant → production lines → machines hierarchy
MATCH (p:Plant)-[:PlantHasProductionLine]->(pl:ProductionLine)-[:ProductionLineHasMachine]->(m:Machine)
RETURN p.PlantName, pl.LineName, pl.LineType, m.MachineName, m.MachineType, m.Manufacturer, m.Status
ORDER BY p.PlantName, pl.LineName, m.MachineName

# 3. Production lines producing products
MATCH (pl:ProductionLine)-[:ProductionLineProducesProduct]->(pr:Product)
RETURN pl.LineName, pl.LineType, pr.ProductName, pr.ProductCategory, pr.UnitOfMeasure, pr.UnitCost
ORDER BY pl.LineName, pr.ProductName

# 4. Materials used by products
MATCH (pr:Product)-[:ProductUsesMaterial]->(mat:Material)
RETURN pr.ProductName, mat.MaterialName, mat.MaterialType, mat.UnitOfMeasure, mat.UnitCost, mat.Supplier, mat.Status
ORDER BY pr.ProductName, mat.MaterialName

# 5. Operators assigned to production lines
MATCH (op:Operator)-[:OperatorAssignedToLine]->(pl:ProductionLine)
RETURN op.OperatorName, op.Role, op.Shift, op.Certification, pl.LineName, pl.LineType
ORDER BY pl.LineName, op.Shift

# 6. Sensors on machines
MATCH (s:Sensor)-[:SensorOnMachine]->(m:Machine)
RETURN m.MachineName, m.MachineType, s.SensorName, s.SensorType, s.Unit, s.MinThreshold, s.MaxThreshold, s.Status
ORDER BY m.MachineName, s.SensorType

# 7. Maintenance orders with machine details
MATCH (mo:MaintenanceOrder)-[:MaintenanceOnMachine]->(m:Machine)
WHERE mo.Status <> 'Completed'
RETURN mo.OrderId, mo.MaintenanceType, mo.Priority, m.MachineName, mo.ScheduledDate, mo.Description, mo.Status
ORDER BY mo.Priority, mo.ScheduledDate

# 8. Quality checks per production batch
MATCH (qc:QualityCheck)-[:QualityCheckForBatch]->(pb:ProductionBatch)
RETURN pb.BatchId, pb.ProductId, qc.CheckType, qc.MeasuredValue, qc.ExpectedValue, qc.Tolerance, qc.Result, qc.CheckDate
ORDER BY pb.BatchId, qc.CheckDate

# 9. Production batches linked to lines
MATCH (pb:ProductionBatch)-[:BatchOnLine]->(pl:ProductionLine)
RETURN pl.LineName, pb.BatchId, pb.ProductId, pb.Quantity, pb.StartTime, pb.EndTime, pb.YieldPercent, pb.Status
ORDER BY pl.LineName, pb.StartTime DESC

# 10. Active alerts per plant
MATCH (p:Plant)-[:PlantHasProductionLine]->(pl:ProductionLine)-[:ProductionLineHasMachine]->(m:Machine), (al:Alert)
WHERE al.MachineId = m.MachineId AND al.Status = 'Active'
RETURN p.PlantName, m.MachineName, al.AlertType, al.Severity, al.Timestamp, al.Value, al.Threshold, al.Description
ORDER BY al.Severity, al.Timestamp DESC

# 11. Full production chain: plant → line → machine → batch → quality
MATCH (p:Plant)-[:PlantHasProductionLine]->(pl:ProductionLine)-[:ProductionLineHasMachine]->(m:Machine)
OPTIONAL MATCH (pb:ProductionBatch)-[:BatchOnLine]->(pl)
OPTIONAL MATCH (qc:QualityCheck)-[:QualityCheckForBatch]->(pb)
RETURN p.PlantName, pl.LineName, m.MachineName, pb.BatchId, pb.YieldPercent, qc.Result
ORDER BY p.PlantName, pl.LineName

# 12. Machine maintenance history and downtime
MATCH (mo:MaintenanceOrder)-[:MaintenanceOnMachine]->(m:Machine)
WHERE mo.Status = 'Completed'
RETURN m.MachineName, m.MachineType, COUNT(mo) AS MaintenanceCount, SUM(mo.EstimatedHours) AS TotalMaintenanceHours
ORDER BY TotalMaintenanceHours DESC

# 13. Operator workload across lines
MATCH (op:Operator)-[:OperatorAssignedToLine]->(pl:ProductionLine)
RETURN op.OperatorName, op.Shift, op.Certification, COUNT(pl) AS LinesAssigned
ORDER BY LinesAssigned DESC
