  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#g)"/>
  <g transform="translate(28,12)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tower / pole -->
