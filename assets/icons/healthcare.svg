<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#g)"/>
  <g transform="translate(25,18)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hospital building -->
    <rect x="12" y="24" width="46" height="56" rx="3" fill="#fff" fill-opacity="0.15" stroke="#fff"/>
    <!-- Hospital cross -->
    <rect x="30" y="32" width="10" height="24" rx="1" fill="#fff" fill-opacity="0.7" stroke="none"/>
    <rect x="24" y="38" width="22" height="12" rx="1" fill="#fff" fill-opacity="0.7" stroke="none"/>
    <!-- Hospital roof -->
    <line x1="8" y1="24" x2="62" y2="24"/>
    <!-- Door -->
    <rect x="30" y="64" width="10" height="16" rx="1" fill="#fff" fill-opacity="0.3" stroke="#fff"/>
    <!-- Windows left column -->
    <rect x="17" y="32" width="5" height="5" rx="0.5" fill="#fff" fill-opacity="0.4" stroke="none"/>
    <rect x="17" y="42" width="5" height="5" rx="0.5" fill="#fff" fill-opacity="0.4" stroke="none"/>
    <rect x="17" y="52" width="5" height="5" rx="0.5" fill="#fff" fill-opacity="0.4" stroke="none"/>
    <!-- Windows right column -->
    <rect x="48" y="32" width="5" height="5" rx="0.5" fill="#fff" fill-opacity="0.4" stroke="none"/>
    <rect x="48" y="42" width="5" height="5" rx="0.5" fill="#fff" fill-opacity="0.4" stroke="none"/>
    <rect x="48" y="52" width="5" height="5" rx="0.5" fill="#fff" fill-opacity="0.4" stroke="none"/>
    <!-- Heartbeat line -->
    <polyline points="2,72 16,72 20,62 24,82 28,68 32,72 70,72" 
              fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.6"/>
  </g>
</svg>
