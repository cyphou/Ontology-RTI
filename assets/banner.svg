<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#742774;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9B4DCA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F2C811;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="url(#bg)"/>
  <!-- Decorative circuit lines -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M0,50 H200 L220,70 H350"/>
    <path d="M0,100 H150 L170,80 H300 L320,100 H450"/>
    <path d="M0,150 H100 L120,130 H280"/>
    <path d="M550,30 H700 L720,50 H900"/>
    <path d="M600,80 H750 L770,100 H900"/>
    <path d="M500,170 H680 L700,150 H900"/>
    <circle cx="200" cy="50" r="3" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="350" cy="70" r="3" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="300" cy="100" r="3" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="700" cy="30" r="3" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="750" cy="100" r="3" fill="#ffffff" fill-opacity="0.1"/>
  </g>
  <!-- Lightning bolt icon -->
  <g transform="translate(80,55)">
    <polygon points="35,0 15,42 28,42 18,90 55,35 40,35 50,0" fill="url(#accent)"/>
  </g>
  <!-- Title text -->
  <text x="160" y="95" font-family="Segoe UI,Arial,sans-serif" font-weight="700" font-size="38" fill="#ffffff" letter-spacing="-0.5">Microsoft Fabric</text>
  <text x="160" y="140" font-family="Segoe UI,Arial,sans-serif" font-weight="300" font-size="34" fill="#ffffff" letter-spacing="1">IQ Ontology Accelerator</text>
  <!-- Tagline -->
  <text x="160" y="172" font-family="Segoe UI,Arial,sans-serif" font-weight="400" font-size="14" fill="#ffffff" fill-opacity="0.7">5 Industry Domains · 59 Entity Types · One Command Deployment</text>
  <!-- Domain icons row (right side) -->
  <g transform="translate(700,65)" fill="#ffffff" fill-opacity="0.25">
    <!-- Oil drop -->
    <path d="M0,40 Q0,55 10,55 Q20,55 20,40 Q20,25 10,10 Q0,25 0,40Z"/>
    <!-- Building -->
    <rect x="35" y="15" width="20" height="40" rx="2"/>
    <rect x="39" y="20" width="4" height="4" fill="#742774"/><rect x="47" y="20" width="4" height="4" fill="#742774"/>
    <rect x="39" y="28" width="4" height="4" fill="#742774"/><rect x="47" y="28" width="4" height="4" fill="#742774"/>
    <rect x="39" y="36" width="4" height="4" fill="#742774"/><rect x="47" y="36" width="4" height="4" fill="#742774"/>
    <!-- Gear -->
    <circle cx="85" cy="35" r="12" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3" fill="none"/>
    <circle cx="85" cy="35" r="5" fill="#ffffff" fill-opacity="0.25"/>
    <!-- Server -->
    <rect x="110" y="18" width="22" height="10" rx="2"/>
    <rect x="110" y="32" width="22" height="10" rx="2"/>
    <rect x="110" y="46" width="22" height="10" rx="2"/>
    <!-- Wind turbine -->
    <line x1="155" y1="55" x2="155" y2="25" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M155,25 L145,10 M155,25 L165,10 M155,25 L155,8" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
  </g>
</svg>
